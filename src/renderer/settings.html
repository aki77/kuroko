<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KUROKO 設定</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>KUROKO 設定</h1>
      <p class="lead">
        変更は保存後すぐに反映されます（再起動不要）。<br />
        環境変数で設定されている項目は編集できません。
      </p>

      <form id="form">
        <label class="field" data-key="model">
          <span class="label">モデル</span>
          <input type="text" name="model" autocomplete="off" spellcheck="false" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">claude -p に渡すモデル名（例: sonnet, opus）</span>
        </label>

        <label class="field" data-key="fontScale">
          <span class="label">文字サイズ</span>
          <!-- 値はFONT_SCALE_PRESETS（src/shared/types.ts）が唯一の情報源。変更時は両方直すこと -->
          <select name="fontScale">
            <option value="1.0">小</option>
            <option value="1.3">中</option>
            <option value="1.7">大</option>
          </select>
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">オーバーレイの文字サイズ</span>
        </label>

        <label class="field" data-key="panelOpacity">
          <span class="label">背景の不透明度</span>
          <!-- min/max は PANEL_OPACITY_MIN/MAX * 100（src/shared/types.ts）。UIは%整数・内部値は小数。 -->
          <input type="range" name="panelOpacity" min="30" max="90" step="2" />
          <output class="range-value" for="panelOpacity"></output>
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">オーバーレイ背景の濃さ（小さいほど背景が透ける）</span>
        </label>

        <label class="field" data-key="myName">
          <span class="label">自分の話者名</span>
          <input type="text" name="myName" autocomplete="off" spellcheck="false" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">
            文字起こしに出る自分の表示名。設定すると本人の発話には「続けて話すべきこと」を提案（空欄で無効）
          </span>
        </label>

        <label class="field" data-key="triggerCueCount">
          <span class="label">自動提案の閾値（発話数）</span>
          <input type="number" name="triggerCueCount" min="1" step="1" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">この件数の新規発話がたまると自動で提案を生成</span>
        </label>

        <label class="field" data-key="recentCueLimit">
          <span class="label">Claudeに渡す直近発話数</span>
          <input type="number" name="recentCueLimit" min="1" step="1" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">多いほど文脈が豊富だが応答は遅くなる</span>
        </label>

        <label class="field" data-key="debounceMs">
          <span class="label">デバウンス (ms)</span>
          <input type="number" name="debounceMs" min="0" step="100" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">追記検知からトリガー判定までの待機</span>
        </label>

        <label class="field" data-key="claudeTimeoutSec">
          <span class="label">要約タイムアウト (秒)</span>
          <input type="number" name="claudeTimeoutSec" min="1" step="1" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">要約プロセス(A)のタイムアウト</span>
        </label>

        <label class="field" data-key="claudeWebTimeoutSec">
          <span class="label">Web検索タイムアウト (秒)</span>
          <input type="number" name="claudeWebTimeoutSec" min="1" step="1" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">Web検索プロセス(B)のタイムアウト（Aより長め）</span>
        </label>

        <label class="field" data-key="claudeCodeTimeoutSec">
          <span class="label">コード参照タイムアウト (秒)</span>
          <input type="number" name="claudeCodeTimeoutSec" min="1" step="1" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">コード参照プロセス(C)のタイムアウト（Aより長め）</span>
        </label>

        <label class="field" data-key="transcriptDir">
          <span class="label">文字起こしディレクトリ</span>
          <input type="text" name="transcriptDir" autocomplete="off" spellcheck="false" />
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">変更すると監視対象を切り替えます（watcher再起動）</span>
        </label>

        <div class="field" data-key="contentProtection">
          <span class="checkbox-row">
            <input type="checkbox" name="contentProtection" />
            <span class="label">画面共有・録画から隠す</span>
          </span>
          <span class="lock-badge" hidden>envで固定中</span>
          <span class="hint">
            ONで画面共有・録画にオーバーレイが映らなくなります。デバッグ時にスクショを共有する場合はOFFにしてください
          </span>
        </div>

        <div class="actions">
          <span class="save-status" id="saveStatus"></span>
          <button type="submit" id="saveBtn">保存</button>
        </div>
      </form>
    </div>
    <script src="settings.js"></script>
  </body>
</html>
