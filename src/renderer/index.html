<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KUROKO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="panel">
      <header class="titlebar">
        <div class="title">
          <span class="dot" id="statusDot"></span>
          <span class="brand-icon" aria-hidden="true">🥷</span>
          <span>KUROKO</span>
        </div>
        <div class="titlebar-actions">
          <button type="button" id="focusModeBtn" data-tooltip="集中／通常モードの切替">📋 通常</button>
          <button type="button" id="settingsBtn" data-tooltip="設定">⚙</button>
          <button type="button" id="debugBtn" data-tooltip="デバッグウィンドウを開く">🐞</button>
          <button type="button" id="refreshBtn" data-tooltip="今すぐ提案 (⌘⇧K)">↻</button>
        </div>
      </header>

      <div class="status-line" id="statusLine">待機中…</div>

      <div class="projectdir-row" id="projectDirRow">
        <span class="projectdir-icon" aria-hidden="true">📁</span>
        <input
          id="projectDirInput"
          class="field-input"
          type="text"
          placeholder="参照プロジェクトのパス（任意）"
          autocomplete="off"
          spellcheck="false"
        />
        <ul class="projectdir-suggest" id="projectDirSuggest" hidden></ul>
        <span class="projectdir-lock" id="projectDirLock" hidden data-tooltip="KUROKO_PROJECT_DIRで固定中">🔒</span>
      </div>

      <div class="context-row" id="contextRow">
        <button class="context-open-btn" id="contextOpenBtn" type="button" data-tooltip="コンテキストを編集">
          <span aria-hidden="true">📝</span>
          <span>コンテキスト</span>
          <span class="context-badge" id="contextBadge" hidden>登録済み</span>
          <span class="context-lock" id="contextLock" hidden data-tooltip="KUROKO_MEETING_CONTEXTで固定中">🔒</span>
        </button>
      </div>

      <main class="content" id="content">
        <div class="empty" id="empty">
          会議が始まると、ここに話題の要約・次に話すべきこと・背景知識が表示されます。
        </div>

        <section class="block topic-block" id="topicBlock" hidden>
          <h1>
            <button type="button" id="topicHeader" aria-expanded="true">
              <span class="collapse-indicator" id="summaryCaret" aria-hidden="true">▼</span>
              <span id="topic">話題</span>
            </button>
          </h1>
          <p id="discussion"></p>
        </section>

        <section class="block" id="questionsBlock" hidden>
          <h2>次に話すべきこと</h2>
          <ul id="questions"></ul>
        </section>

        <section class="block" id="webBlock" hidden>
          <h2>FROM THE WEB</h2>
          <div id="web"></div>
        </section>

        <section class="block" id="codeBlock" hidden>
          <h2>FROM THE CODE</h2>
          <div id="code"></div>
        </section>
      </main>

      <footer class="footer" id="footer">
        <span class="footer-status" id="footerStatus"></span>
        <span class="history-nav" id="historyNav">
          <span class="history-unseen" id="historyUnseen" hidden>● 新着</span>
          <!-- disabled中はmouseover等が発火せずdata-tooltipが表示されないが、
               履歴が1件のみ/端に到達した状態でツールチップが出ないのは仕様上問題ないため許容している -->
          <button type="button" id="historyPrevBtn" data-tooltip="前の提案 (⌘⇧←)">◀</button>
          <span class="history-position" id="historyPosition">0 / 0</span>
          <button type="button" id="historyNextBtn" data-tooltip="次の提案 (⌘⇧→)">▶</button>
        </span>
      </footer>
    </div>
    <div class="url-tooltip" id="urlTooltip" hidden></div>
    <script src="renderer.js"></script>
  </body>
</html>
