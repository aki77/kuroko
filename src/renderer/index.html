<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KUROKO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="panel">
      <header class="titlebar">
        <div class="title">
          <span class="dot" id="statusDot"></span>
          <span class="brand-icon" aria-hidden="true">🥷</span>
          <span>KUROKO</span>
        </div>
        <div class="titlebar-actions">
          <button id="settingsBtn" title="設定">⚙</button>
          <button id="refreshBtn" title="今すぐ提案 (⌘⇧K)">↻</button>
        </div>
      </header>

      <div class="status-line" id="statusLine">待機中…</div>

      <div class="projectdir-row" id="projectDirRow">
        <span class="projectdir-icon" aria-hidden="true">📁</span>
        <input
          id="projectDirInput"
          list="projectDirHistory"
          type="text"
          placeholder="参照プロジェクトのパス（任意）"
          autocomplete="off"
          spellcheck="false"
        />
        <datalist id="projectDirHistory"></datalist>
        <span class="projectdir-lock" id="projectDirLock" hidden title="KUROKO_PROJECT_DIRで固定中">🔒</span>
      </div>

      <main class="content" id="content">
        <div class="empty" id="empty">
          会議が始まると、ここに話題の要約・次に話すべきこと・背景知識が表示されます。
        </div>

        <section class="block topic-block" id="topicBlock" hidden>
          <h1 id="topic"></h1>
          <p id="discussion"></p>
        </section>

        <section class="block" id="questionsBlock" hidden>
          <h2>次に話すべきこと</h2>
          <ul id="questions"></ul>
        </section>

        <section class="block" id="webBlock" hidden>
          <h2>FROM THE WEB</h2>
          <div id="web"></div>
        </section>

        <section class="block" id="codeBlock" hidden>
          <h2>FROM THE CODE</h2>
          <div id="code"></div>
        </section>
      </main>

      <footer class="footer" id="footer">
        <span class="footer-status" id="footerStatus"></span>
        <span class="history-nav" id="historyNav">
          <span class="history-unseen" id="historyUnseen" hidden>● 新着</span>
          <button id="historyPrevBtn" title="前の提案 (⌘⇧←)">◀</button>
          <span class="history-position" id="historyPosition">0 / 0</span>
          <button id="historyNextBtn" title="次の提案 (⌘⇧→)">▶</button>
        </span>
      </footer>
    </div>
    <div class="url-tooltip" id="urlTooltip" hidden></div>
    <script src="renderer.js"></script>
  </body>
</html>
